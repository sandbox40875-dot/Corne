# =====================================================
# Corne – Base Shield Configuration
# =====================================================

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Sleep control ---
CONFIG_ZMK_SLEEP=y

# 4 hours
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=14400000


# --- Split keyboard ---
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# --- Remove unused peripherals ---
CONFIG_ZMK_DISPLAY=n


# --- Bluetooth name ---
CONFIG_BT_DEVICE_NAME="MK42Keyboard"

CONFIG_SPI=y
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y

CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=80
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0