# =====================================================
# Corne – Base Shield Configuration
# =====================================================

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Sleep control ---
CONFIG_ZMK_SLEEP=y

# 4 hours
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=14400000


# --- Split keyboard ---
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# --- Remove unused peripherals ---
CONFIG_ZMK_DISPLAY=n


# --- Bluetooth name ---
CONFIG_BT_DEVICE_NAME="MK42Keyboard"

# Enable WS2812 widget
CONFIG_WS2812_WIDGET=y

# Enable LED strip support
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y

# SPI support (for nRF52 boards)
CONFIG_SPI=y

# Optional: Customize timing
CONFIG_WS2812_WIDGET_BATTERY_BLINK_MS=200
CONFIG_WS2812_WIDGET_CONN_BLINK_MS=150
CONFIG_WS2812_WIDGET_LAYER_BLINK_MS=100


# Battery colors (hex RGB values)

CONFIG_WS2812_WIDGET_BATTERY_COLOR_CRITICAL=0xFF0000  # Red


# Layer-specific persistent colors
CONFIG_WS2812_WIDGET_LAYER_0_COLOR=0x000000          
CONFIG_WS2812_WIDGET_LAYER_1_COLOR=0x0000FF          
CONFIG_WS2812_WIDGET_LAYER_2_COLOR=0x00FF00          

